<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WolfpackFront</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0a0a0a;
      color: #fefefe;
      text-align: center;
      padding-top: 60px;
    }
    img {
      margin: 20px;
      border-radius: 12px;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 0.2em;
    }
    p {
      font-size: 1.2em;
      margin-top: 0;
      color: #ccc;
    }
    .cta-button {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 1em;
      color: white;
      background-color: #d40000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
    }
    .cta-button:hover {
      background-color: #ff1a1a;
    }
  </style>
</head>
<body>

  <img src="wolfpack-logo.png" alt="WolfpackFront Logo" width="180">
  <h1>WolfpackFront</h1>
  <p>Welcome, Commander. This is the new home of the Pack.</p>

  <img src="elon-avatar.png" alt="Commander DG" width="150">

  <button class="cta-button">Enter the Command Center</button>

</body>
</html>
